services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: upstream_shop
      POSTGRES_USER: upstream
      POSTGRES_PASSWORD: upstream_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U upstream"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - media-data:/app/media
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed_data --skip-if-exists &&
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_STRIPE_PK: ${STRIPE_PUBLISHABLE_KEY:-pk_test_placeholder}
      VITE_PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-sandbox_placeholder}
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0 --port 3000

volumes:
  pgdata:
  media-data:
